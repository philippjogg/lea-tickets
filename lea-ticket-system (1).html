<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEA Partners — Ticket System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #EEEEEE; min-height: 100vh; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const C = { pink:"#FF005E", black:"#000000", white:"#FFFFFF", gray:"#999999", lightGray:"#EEEEEE", lightPink:"#FFDCE9" };
const TEAM = ["Philipp Joggerst","Joachim Masurek","Kerstin Pfleger","Nils Berger","Kurt Weise","Daniel Seiler","Juanse Cordovez","Lucia Otero"];
const STORAGE_KEY = "lea-tickets-v3";
const COUNTER_KEY = "lea-counter-v3";
const USER_KEY = "lea-user-v3";

const SEED = [
  { id:"T-001", subject:"RE: LEA 03 - Cashflow notices confirmation request", from:"northleaf_reporting@colmore.com",
    body:"Hi team,\n\nMay we please have an update regarding the below request? We appreciate your assistance.\n\nRegards,\nManoj Bhat | Analyst, BlackRock\n\n---\nOriginal (10.06.2026): We are contacting you on behalf of Northleaf, as their portfolio administrators. Could you please check and confirm whether there are any cash flow notices for LEA Fund III with a value date of 26/05/22?",
    category:"Fund Operations", priority:"High", status:"Open", assignee:"Kerstin Pfleger",
    created:"2026-06-11T20:02:51", updated:"2026-06-11T20:02:51",
    aiSummary:"Northleaf/BlackRock fragt nach Cashflow-Notices für LEA Fund III (Valuedatum 26.05.22) — Follow-up auf unbeantwortete Erstanfrage.",
    replies:[], createdBy:"Outlook Import" },
];

// Storage (localStorage — persists in browser)
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+d.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
}
function priColor(p) { return p==="High"?C.pink:p==="Medium"?"#FF8C00":C.gray; }
function sbadge(s) {
  return ({
    "Open":{bg:C.lightPink,color:C.pink,label:"Offen"},
    "In Progress":{bg:"#FFF3CD",color:"#856404",label:"In Bearbeitung"},
    "Resolved":{bg:"#D4EDDA",color:"#155724",label:"Gelöst"},
    "Closed":{bg:C.lightGray,color:C.gray,label:"Geschlossen"},
  })[s]||{bg:C.lightPink,color:C.pink,label:"Offen"};
}

async function callClaude(system, user) {
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system,messages:[{role:"user",content:user}]}),
    });
    return (await res.json()).content?.[0]?.text||"";
  } catch { return ""; }
}
async function aiAnalyze(subject, body) {
  const raw = await callClaude(
    `Du bist Ticket-System für LEA Partners (Private Equity, DACH). Antworte NUR mit JSON (kein Markdown):
{"summary":"1-2 Sätze DE","category":"KYC / Compliance|Fundraising / LP|Fund Operations|IT / Tooling|Sonstiges","priority":"High|Medium|Low","suggestedAssignee":"Philipp Joggerst|Joachim Masurek|Kerstin Pfleger|Nils Berger|Kurt Weise|Daniel Seiler|Juanse Cordovez|Lucia Otero"}`,
    `Betreff: ${subject}\n\n${body}`
  );
  try { return JSON.parse(raw.replace(/```json|```/g,"").trim()); }
  catch { return {summary:"–",category:"Sonstiges",priority:"Medium",suggestedAssignee:"Philipp Joggerst"}; }
}
async function aiReply(ticket) {
  return callClaude(
    `Du bist Mitarbeiter bei LEA Partners GmbH. Professionelle, prägnante Antwort (Sprache des Absenders). Direkt, klar. Keine Signatur.`,
    `Betreff: ${ticket.subject}\nVon: ${ticket.from}\n\n${ticket.body}`
  );
}

const inp = {display:"block",width:"100%",padding:"8px 10px",border:"1px solid #CCC",borderRadius:3,fontSize:13,fontFamily:"Arial,sans-serif",outline:"none",marginBottom:12,background:"#FAFAFA"};
const sel = {padding:"7px 10px",border:"1px solid #CCC",borderRadius:3,fontSize:13,fontFamily:"Arial,sans-serif",background:"#FAFAFA",cursor:"pointer"};
const lbl = {display:"block",fontSize:11,fontWeight:600,color:"#555",fontFamily:"Arial,sans-serif",marginBottom:4,textTransform:"uppercase",letterSpacing:0.4};
const btnP = {background:C.pink,color:C.white,border:"none",borderRadius:3,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"Arial,sans-serif",display:"inline-flex",alignItems:"center",gap:6};
const btnB = {...btnP,background:C.black};
const btnG = {background:"transparent",color:C.gray,border:"none",borderRadius:3,padding:"6px 10px",fontSize:13,cursor:"pointer",fontFamily:"Arial,sans-serif"};
const tdS = {padding:"11px 13px",textAlign:"left",verticalAlign:"middle"};

function Badge({label,bg,color}){return <span style={{background:bg,color,fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:3,whiteSpace:"nowrap"}}>{label}</span>;}
function Spin(){return <span style={{display:"inline-block",width:14,height:14,border:`2px solid ${C.lightGray}`,borderTop:`2px solid ${C.pink}`,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>;}

function Modal({onClose,children,wide}){
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:C.white,width:"100%",maxWidth:wide?780:520,borderRadius:4,boxShadow:"0 8px 40px rgba(0,0,0,0.18)",maxHeight:"90vh",overflowY:"auto"}}>
      {children}
    </div>
  </div>;
}

function Login({onLogin}){
  const [name,setName]=useState("");
  return <div style={{minHeight:"100vh",background:C.black,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{background:C.white,borderRadius:4,padding:40,width:"100%",maxWidth:380,boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:28}}>
        <div style={{width:5,height:32,background:C.pink}}/>
        <div>
          <div style={{fontWeight:700,fontSize:16}}>LEA Partners</div>
          <div style={{fontSize:12,color:C.gray}}>Ticket System</div>
        </div>
      </div>
      <label style={lbl}>Wer bist du?</label>
      <select style={{...sel,width:"100%",marginBottom:20}} value={name} onChange={e=>setName(e.target.value)}>
        <option value="">— Auswählen —</option>
        {TEAM.map(m=><option key={m} value={m}>{m}</option>)}
      </select>
      <button onClick={()=>name&&onLogin(name)} disabled={!name} style={{...btnP,width:"100%",justifyContent:"center"}}>Einloggen</button>
    </div>
  </div>;
}

function NewTicket({onClose,onCreated,user}){
  const [form,setForm]=useState({from:"",subject:"",body:""});
  const [loading,setLoading]=useState(false);
  const [ai,setAi]=useState(null);
  const ok=form.subject&&form.body;

  async function analyze(){setLoading(true);setAi(await aiAnalyze(form.subject,form.body));setLoading(false);}
  function create(){
    const r=ai||{summary:"",category:"Sonstiges",priority:"Medium",suggestedAssignee:user};
    onCreated({from:form.from,subject:form.subject,body:form.body,category:r.category,priority:r.priority,assignee:r.suggestedAssignee,aiSummary:r.summary,createdBy:user});
    onClose();
  }
  return <Modal onClose={onClose}>
    <div style={{padding:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:17,fontWeight:600}}>Neues Ticket</h2>
        <button onClick={onClose} style={btnG}>✕</button>
      </div>
      <label style={lbl}>Absender</label>
      <input style={inp} value={form.from} onChange={e=>setForm(f=>({...f,from:e.target.value}))} placeholder="absender@firma.com"/>
      <label style={lbl}>Betreff</label>
      <input style={inp} value={form.subject} onChange={e=>setForm(f=>({...f,subject:e.target.value}))} placeholder="E-Mail Betreff"/>
      <label style={lbl}>E-Mail Inhalt</label>
      <textarea style={{...inp,height:120,resize:"vertical"}} value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))} placeholder="E-Mail Text einfügen..."/>
      <div style={{display:"flex",gap:10,marginTop:4,alignItems:"center"}}>
        <button onClick={analyze} disabled={!ok||loading} style={btnB}>{loading?<Spin/>:"🤖"} KI-Analyse</button>
        {ai&&<span style={{fontSize:12,color:"#155724"}}>✓ Analysiert</span>}
      </div>
      {ai&&<div style={{marginTop:14,padding:14,background:C.lightPink,borderLeft:`3px solid ${C.pink}`,borderRadius:3}}>
        <p style={{margin:"0 0 8px",fontSize:13}}>{ai.summary}</p>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:12}}>
          <span><strong>Kategorie:</strong> {ai.category}</span>
          <span><strong>Priorität:</strong> <span style={{color:priColor(ai.priority)}}>{ai.priority}</span></span>
          <span><strong>Vorschlag:</strong> {ai.suggestedAssignee}</span>
        </div>
      </div>}
      <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:20}}>
        <button onClick={onClose} style={btnG}>Abbrechen</button>
        <button onClick={create} disabled={!ok} style={btnP}>Erstellen</button>
      </div>
    </div>
  </Modal>;
}

function Detail({ticket,onClose,onUpdate,user}){
  const [t,setT]=useState({...ticket});
  const [reply,setReply]=useState("");
  const [aiLoad,setAiLoad]=useState(false);

  function doSave(u){const upd={...t,...u,updated:new Date().toISOString()};setT(upd);onUpdate(upd);}
  async function genReply(){setAiLoad(true);setReply(await aiReply(t));setAiLoad(false);}
  function send(){
    if(!reply.trim())return;
    doSave({replies:[...t.replies,{id:`R-${Date.now()}`,author:user,text:reply,timestamp:new Date().toISOString()}],status:t.status==="Open"?"In Progress":t.status});
    setReply("");
  }
  const sb=sbadge(t.status);
  return <Modal onClose={onClose} wide>
    <div style={{padding:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <span style={{fontSize:12,color:C.gray,fontWeight:600}}>{t.id}</span>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:11,color:C.gray}}>von {t.createdBy}</span>
          <button onClick={onClose} style={btnG}>✕</button>
        </div>
      </div>
      <h2 style={{margin:"0 0 14px",fontSize:17,fontWeight:600,lineHeight:1.3}}>{t.subject}</h2>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
        <Badge label={sb.label} bg={sb.bg} color={sb.color}/>
        <Badge label={t.priority} bg={t.priority==="High"?C.lightPink:"#FFF3CD"} color={priColor(t.priority)}/>
        <Badge label={t.category} bg={C.lightGray} color={C.black}/>
        <span style={{fontSize:12,color:C.gray}}>Von: {t.from}</span>
        <span style={{fontSize:12,color:C.gray}}>· {fmtDate(t.created)}</span>
      </div>
      {t.aiSummary&&<div style={{padding:12,background:C.lightPink,borderLeft:`3px solid ${C.pink}`,borderRadius:3,marginBottom:16,fontSize:13}}>
        <strong style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,color:C.pink}}>KI-Zusammenfassung</strong>
        <p style={{margin:"4px 0 0"}}>{t.aiSummary}</p>
      </div>}
      <div style={{background:C.lightGray,borderRadius:3,padding:14,marginBottom:16,fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.6}}>{t.body}</div>
      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        {[
          {label:"Status",val:t.status,opts:["Open","In Progress","Resolved","Closed"],fn:v=>doSave({status:v})},
          {label:"Bearbeiter",val:t.assignee,opts:TEAM,fn:v=>doSave({assignee:v})},
          {label:"Priorität",val:t.priority,opts:["High","Medium","Low"],fn:v=>doSave({priority:v})},
        ].map(c=><div key={c.label}>
          <label style={lbl}>{c.label}</label>
          <select style={sel} value={c.val} onChange={e=>c.fn(e.target.value)}>
            {c.opts.map(o=><option key={o}>{o}</option>)}
          </select>
        </div>)}
      </div>
      {t.replies.length>0&&<div style={{marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:8,textTransform:"uppercase",letterSpacing:0.4}}>Verlauf</div>
        {t.replies.map(r=><div key={r.id} style={{borderLeft:`3px solid ${r.author===user?C.pink:C.lightGray}`,paddingLeft:12,marginBottom:12}}>
          <div style={{fontSize:11,color:C.gray,marginBottom:3}}>
            <strong style={{color:r.author===user?C.pink:C.black}}>{r.author}</strong> · {fmtDate(r.timestamp)}
          </div>
          <p style={{margin:0,fontSize:13,whiteSpace:"pre-wrap",lineHeight:1.6}}>{r.text}</p>
        </div>)}
      </div>}
      <div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:8,textTransform:"uppercase",letterSpacing:0.4}}>Antwort</div>
      <textarea style={{...inp,height:100,resize:"vertical"}} value={reply} onChange={e=>setReply(e.target.value)} placeholder="Antwort verfassen..."/>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <button onClick={genReply} disabled={aiLoad} style={btnB}>{aiLoad?<Spin/>:"🤖"} KI-Antwort</button>
        <button onClick={send} disabled={!reply.trim()} style={btnP}>Senden</button>
      </div>
    </div>
  </Modal>;
}

function Stats({tickets,me}){
  const act=tickets.filter(t=>t.status!=="Resolved"&&t.status!=="Closed");
  return <div style={{display:"flex",gap:14,marginBottom:24,flexWrap:"wrap"}}>
    {[
      {label:"Offen",value:tickets.filter(t=>t.status==="Open").length,color:C.pink},
      {label:"In Bearbeitung",value:tickets.filter(t=>t.status==="In Progress").length,color:"#856404"},
      {label:"Erledigt",value:tickets.filter(t=>t.status==="Resolved"||t.status==="Closed").length,color:"#155724"},
      {label:"Meine Tickets",value:act.filter(t=>t.assignee===me).length,color:C.black},
    ].map(s=><div key={s.label} style={{flex:"1 1 110px",border:`1px solid ${C.lightGray}`,borderRadius:4,padding:"12px 16px",background:C.white}}>
      <div style={{fontSize:24,fontWeight:700,color:s.color}}>{s.value}</div>
      <div style={{fontSize:11,color:C.gray,marginTop:2}}>{s.label}</div>
    </div>)}
  </div>;
}

function App(){
  const [user,setUser]=useState(()=>load(USER_KEY,""));
  const [tickets,setTickets]=useState(()=>load(STORAGE_KEY,SEED));
  const [counter,setCounter]=useState(()=>load(COUNTER_KEY,4));
  const [showNew,setShowNew]=useState(false);
  const [selected,setSelected]=useState(null);
  const [filter,setFilter]=useState({status:"all",priority:"all",assignee:"all",search:""});
  const [myOnly,setMyOnly]=useState(false);

  function login(name){save(USER_KEY,name);setUser(name);}
  function logout(){save(USER_KEY,"");setUser("");}

  function created(data){
    const nc=counter+1;
    const t={id:`T-${String(counter).padStart(3,"0")}`,status:"Open",created:new Date().toISOString(),updated:new Date().toISOString(),replies:[],...data};
    const upd=[t,...tickets];
    setTickets(upd);setCounter(nc);
    save(STORAGE_KEY,upd);save(COUNTER_KEY,nc);
  }

  function updated(t){
    const upd=tickets.map(x=>x.id===t.id?t:x);
    setTickets(upd);setSelected(t);
    save(STORAGE_KEY,upd);
  }

  if(!user)return <Login onLogin={login}/>;

  const list=tickets.filter(t=>{
    if(myOnly&&t.assignee!==user)return false;
    if(filter.status!=="all"&&t.status!==filter.status)return false;
    if(filter.priority!=="all"&&t.priority!==filter.priority)return false;
    if(filter.assignee!=="all"&&t.assignee!==filter.assignee)return false;
    if(filter.search){const q=filter.search.toLowerCase();if(!t.subject.toLowerCase().includes(q)&&!t.from.toLowerCase().includes(q)&&!(t.aiSummary||"").toLowerCase().includes(q))return false;}
    return true;
  });

  return <div style={{minHeight:"100vh",background:C.lightGray}}>
    <div style={{background:C.black,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:5,height:28,background:C.pink,borderRadius:1}}/>
        <span style={{color:C.white,fontWeight:600,fontSize:15}}>LEA Partners</span>
        <span style={{color:C.gray,fontSize:13}}>/ Ticket System</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{color:C.gray,fontSize:12}}>{user.split(" ")[0]}</span>
        <button onClick={()=>setShowNew(true)} style={btnP}>+ Neues Ticket</button>
        <button onClick={logout} style={{...btnG,color:"#666",fontSize:12}}>Abmelden</button>
      </div>
    </div>

    <div style={{maxWidth:1200,margin:"0 auto",padding:"24px 20px"}}>
      <Stats tickets={tickets} me={user}/>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <input style={{...inp,flex:"1 1 180px",maxWidth:260,margin:0}} placeholder="Suche..." value={filter.search} onChange={e=>setFilter(f=>({...f,search:e.target.value}))}/>
        <select style={sel} value={filter.status} onChange={e=>setFilter(f=>({...f,status:e.target.value}))}>
          <option value="all">Alle Status</option>
          {["Open","In Progress","Resolved","Closed"].map(s=><option key={s} value={s}>{sbadge(s).label}</option>)}
        </select>
        <select style={sel} value={filter.priority} onChange={e=>setFilter(f=>({...f,priority:e.target.value}))}>
          <option value="all">Alle Prioritäten</option>
          {["High","Medium","Low"].map(p=><option key={p} value={p}>{p}</option>)}
        </select>
        <select style={sel} value={filter.assignee} onChange={e=>setFilter(f=>({...f,assignee:e.target.value}))}>
          <option value="all">Alle Mitarbeiter</option>
          {TEAM.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,cursor:"pointer",color:myOnly?C.pink:C.gray}}>
          <input type="checkbox" checked={myOnly} onChange={e=>setMyOnly(e.target.checked)}/> Nur meine
        </label>
      </div>

      <div style={{background:C.white,borderRadius:4,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.07)"}}>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr style={{borderBottom:`2px solid ${C.black}`}}>
              {["ID","Betreff / Zusammenfassung","Status","Priorität","Kategorie","Bearbeiter","Aktualisiert"].map(h=>
                <th key={h} style={{...tdS,fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:0.5,color:C.gray,paddingTop:11,paddingBottom:11}}>{h}</th>
              )}
            </tr>
          </thead>
          <tbody>
            {list.length===0
              ?<tr><td colSpan={7} style={{textAlign:"center",padding:48,color:C.gray}}>Keine Tickets gefunden</td></tr>
              :list.map(t=>{
                const sb=sbadge(t.status);
                return <tr key={t.id} onClick={()=>setSelected(t)}
                  style={{cursor:"pointer",borderBottom:`1px solid ${C.lightGray}`,background:t.assignee===user?"#FFFBFC":C.white}}
                  onMouseEnter={e=>e.currentTarget.style.background="#F8F8F8"}
                  onMouseLeave={e=>e.currentTarget.style.background=t.assignee===user?"#FFFBFC":C.white}>
                  <td style={tdS}>
                    <div style={{fontSize:11,color:C.gray,fontWeight:600}}>{t.id}</div>
                    {t.createdBy==="Outlook Import"&&<div style={{fontSize:10,color:C.pink}}>● Outlook</div>}
                  </td>
                  <td style={tdS}>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{t.subject}</div>
                    <div style={{fontSize:11,color:C.gray}}>{t.aiSummary}</div>
                  </td>
                  <td style={tdS}><Badge label={sb.label} bg={sb.bg} color={sb.color}/></td>
                  <td style={tdS}><span style={{fontSize:12,color:priColor(t.priority),fontWeight:700}}>{t.priority}</span></td>
                  <td style={tdS}><span style={{fontSize:12}}>{t.category}</span></td>
                  <td style={tdS}><span style={{fontSize:12,color:t.assignee===user?C.pink:C.black,fontWeight:t.assignee===user?600:400}}>
                    {t.assignee.split(" ")[0]} {t.assignee.split(" ")[1]?.[0]}.
                  </span></td>
                  <td style={tdS}><span style={{fontSize:11,color:C.gray}}>{fmtDate(t.updated)}</span></td>
                </tr>;
              })
            }
          </tbody>
        </table>
      </div>
      <div style={{marginTop:8,fontSize:11,color:C.gray}}>{list.length} Ticket{list.length!==1?"s":""}</div>
    </div>

    {showNew&&<NewTicket onClose={()=>setShowNew(false)} onCreated={created} user={user}/>}
    {selected&&<Detail ticket={selected} onClose={()=>setSelected(null)} onUpdate={updated} user={user}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
